<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Otopark Plaka Kontrol</title>
<style>
:root{--card:#fff;--soft:#f8fafc;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--orange:#f59e0b;--dark:#111827;--purple:#7c3aed}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:var(--text);padding:10px}.app{max-width:780px;margin:0 auto;background:var(--card);border-radius:22px;overflow:hidden;box-shadow:0 14px 35px rgba(15,23,42,.2)}.top{padding:18px;background:linear-gradient(135deg,#eff6ff,#fff);border-bottom:1px solid var(--border)}h1{margin:0 0 6px;font-size:24px}.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.35}.content{padding:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat{background:var(--soft);border:1px solid var(--border);border-radius:16px;padding:10px 8px;text-align:center}.label{font-size:12px;color:var(--muted);margin-bottom:3px}.value{font-size:24px;font-weight:900;line-height:1}.controls{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}.search,textarea{width:100%;border:1px solid var(--border);border-radius:15px;background:#f8fafc;font-size:16px;outline:none}.search{padding:13px 14px}.search:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.14);background:#fff}.button-row,.bottom-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:0;border-radius:15px;padding:13px 10px;color:#fff;font-weight:800;font-size:15px;cursor:pointer;touch-action:manipulation;min-height:46px}button:active{transform:scale(.98)}.btn-blue{background:var(--blue)}.btn-green{background:var(--green)}.btn-orange{background:var(--orange)}.btn-red{background:var(--red)}.btn-dark{background:var(--dark)}.btn-purple{background:var(--purple)}.plate-list{display:grid;grid-template-columns:1fr;gap:8px;min-height:80px;margin:12px 0}.plate{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:12px;min-height:56px;user-select:none}.plate.checked{background:#ecfdf5;border-color:#86efac}.plate-main{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer}.plate input{width:25px;height:25px;accent-color:var(--green);flex:0 0 auto}.plate-text{font-size:21px;font-weight:900;letter-spacing:.8px;overflow-wrap:anywhere}.delete-one{width:38px;height:38px;min-height:38px;padding:0;border-radius:12px;background:#fee2e2;color:#991b1b;font-size:20px;line-height:1;flex:0 0 auto}.empty{text-align:center;color:var(--muted);background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px;padding:22px 12px;line-height:1.4}.add-panel{margin-top:12px;background:#f8fafc;border:1px solid var(--border);border-radius:18px;padding:12px;display:none}.add-panel.open{display:block}.panel-title{font-weight:900;margin-bottom:8px;font-size:16px}textarea{min-height:140px;resize:vertical;padding:12px;font-family:inherit;background:#fff}.hint{margin:8px 0 10px;color:var(--muted);font-size:13px;line-height:1.35}.message,.danger-note{display:none;margin-top:10px;padding:10px 12px;border-radius:14px;font-size:14px;line-height:1.35;white-space:pre-wrap}.message{background:#eff6ff;color:#1e3a8a}.danger-note{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}.output{display:none;margin-top:12px;padding:12px;border-radius:16px;background:#111827;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;white-space:pre-wrap;font-size:14px;line-height:1.5;user-select:text}@media(min-width:620px){.plate-list{grid-template-columns:1fr 1fr}.controls{grid-template-columns:1fr auto;align-items:center}.button-row{grid-template-columns:repeat(2,145px)}.bottom-buttons{grid-template-columns:repeat(4,1fr)}}@media(max-width:420px){body{padding:8px}.content{padding:12px}h1{font-size:22px}.plate-text{font-size:20px}.value{font-size:22px}button{font-size:14px}}
</style>
</head>
<body>
<main class="app">
<section class="top"><h1>Otopark Plaka Kontrol</h1><p class="sub">Plakaları ekle, doğruladıklarını tikle. Liste bu cihazdaki Safari/tarayıcı hafızasında saklanır.</p></section>
<section class="content">
<div class="stats"><div class="stat"><div class="label">Toplam</div><div class="value" id="totalCount">0</div></div><div class="stat"><div class="label">Tikli</div><div class="value" id="checkedCount">0</div></div><div class="stat"><div class="label">Tiksiz</div><div class="value" id="uncheckedCount">0</div></div></div>
<div class="controls"><input class="search" id="searchInput" type="text" placeholder="Plaka ara..." autocomplete="off"><div class="button-row"><button class="btn-green" id="checkVisibleBtn">Görünenleri Tikle</button><button class="btn-orange" id="clearTicksBtn">Tikleri Temizle</button></div></div>
<div id="plateList" class="plate-list"></div>
<div class="bottom-buttons"><button class="btn-blue" id="toggleAddBtn">Plaka Ekle</button><button class="btn-purple" id="showCheckedBtn">Tiklenenleri Göster</button><button class="btn-dark" id="showUncheckedBtn">Tiksizleri Göster</button><button class="btn-red" id="clearPlatesBtn">Plakaları Temizle</button></div>
<div id="addPanel" class="add-panel"><div class="panel-title">Plaka Ekle</div><textarea id="plateTextarea" placeholder="Plakaları alt alta yapıştır:\n35ABC123\n34XYZ45\n48YY528"></textarea><p class="hint">Her satıra bir plaka yaz. Boş satırlar atlanır. Aynı plaka ikinci kez eklenmez. Plakalar otomatik büyük harfe çevrilir.</p><div class="button-row"><button class="btn-green" id="addPlatesBtn">Ekle</button><button class="btn-dark" id="closeAddBtn">Kapat</button></div><div id="message" class="message"></div></div>
<div id="dangerNote" class="danger-note"></div><div id="output" class="output"></div>
</section>
</main>
<script>
const STORAGE_KEY="ios_otopark_plaka_kontrol_v2";
const defaultData=["35BMJ482","34NFH499","35AS4207","34PCZ148","35AKS788","34PDP602","35CPL397","16BGT30","34KG6380","34MNT711","48YY528","34GAD295","34MYK082","34HBM247","34LRT20"].map(p=>({plate:p,checked:false}));
let plates=loadData();
const plateList=document.getElementById("plateList"),totalCount=document.getElementById("totalCount"),checkedCount=document.getElementById("checkedCount"),uncheckedCount=document.getElementById("uncheckedCount"),searchInput=document.getElementById("searchInput"),addPanel=document.getElementById("addPanel"),plateTextarea=document.getElementById("plateTextarea"),message=document.getElementById("message"),output=document.getElementById("output"),dangerNote=document.getElementById("dangerNote");
document.getElementById("toggleAddBtn").addEventListener("click",toggleAddPanel);document.getElementById("closeAddBtn").addEventListener("click",closeAddPanel);document.getElementById("addPlatesBtn").addEventListener("click",addPlates);document.getElementById("clearTicksBtn").addEventListener("click",clearTicks);document.getElementById("clearPlatesBtn").addEventListener("click",clearPlates);document.getElementById("showCheckedBtn").addEventListener("click",()=>showList(true));document.getElementById("showUncheckedBtn").addEventListener("click",()=>showList(false));document.getElementById("checkVisibleBtn").addEventListener("click",checkVisible);searchInput.addEventListener("input",render);
function loadData(){try{const s=localStorage.getItem(STORAGE_KEY);if(!s)return defaultData;const p=JSON.parse(s);if(!Array.isArray(p))return defaultData;return p.filter(i=>i&&typeof i.plate==="string").map(i=>({plate:normalizePlate(i.plate),checked:!!i.checked}))}catch(e){return defaultData}}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(plates))}
function normalizePlate(v){return String(v).trim().replace(/\s+/g,"").toLocaleUpperCase("tr-TR")}
function render(){const f=normalizePlate(searchInput.value);plateList.innerHTML="";const visible=plates.filter(i=>i.plate.includes(f));if(visible.length===0){const empty=document.createElement("div");empty.className="empty";empty.textContent=plates.length===0?"Henüz plaka yok. Alttaki Plaka Ekle butonuyla plaka ekleyebilirsin.":"Aramayla eşleşen plaka yok.";plateList.appendChild(empty)}else{visible.forEach(item=>{const row=document.createElement("div");row.className="plate"+(item.checked?" checked":"");const label=document.createElement("label");label.className="plate-main";const cb=document.createElement("input");cb.type="checkbox";cb.checked=item.checked;cb.addEventListener("change",()=>{item.checked=cb.checked;saveData();render()});const span=document.createElement("span");span.className="plate-text";span.textContent=item.plate;const del=document.createElement("button");del.className="delete-one";del.type="button";del.textContent="×";del.title="Bu plakayı sil";del.addEventListener("click",()=>deletePlate(item.plate));label.appendChild(cb);label.appendChild(span);row.appendChild(label);row.appendChild(del);plateList.appendChild(row)})}updateStats()}
function updateStats(){const total=plates.length,checked=plates.filter(i=>i.checked).length;totalCount.textContent=total;checkedCount.textContent=checked;uncheckedCount.textContent=total-checked}
function toggleAddPanel(){addPanel.classList.toggle("open");message.style.display="none";output.style.display="none";dangerNote.style.display="none";if(addPanel.classList.contains("open"))setTimeout(()=>plateTextarea.focus(),80)}
function closeAddPanel(){addPanel.classList.remove("open")}
function addPlates(){const candidates=plateTextarea.value.split(/\n|,|;|\t/g).map(normalizePlate).filter(Boolean);const existing=new Set(plates.map(i=>i.plate));let added=0,duplicates=0;candidates.forEach(p=>{if(existing.has(p)){duplicates++;return}plates.push({plate:p,checked:false});existing.add(p);added++});saveData();plateTextarea.value="";render();message.textContent=added+" plaka eklendi."+(duplicates?"\n"+duplicates+" tekrar eden plaka eklenmedi.":"");message.style.display="block"}
function clearTicks(){plates.forEach(i=>i.checked=false);saveData();output.style.display="none";dangerNote.style.display="none";render()}
function clearPlates(){if(plates.length===0){dangerNote.textContent="Silinecek plaka yok.";dangerNote.style.display="block";return}if(!confirm("Tüm plakalar silinsin mi? Bu işlem geri alınamaz."))return;plates=[];saveData();output.style.display="none";dangerNote.style.display="none";render()}
function deletePlate(p){if(!confirm(p+" silinsin mi?"))return;plates=plates.filter(i=>i.plate!==p);saveData();output.style.display="none";render()}
function showList(wanted){const selected=plates.filter(i=>i.checked===wanted).map(i=>i.plate);output.textContent=(wanted?"TİKLENEN PLAKALAR":"TİKSİZ PLAKALAR")+" ("+selected.length+"):\n"+(selected.length?selected.join("\n"):"Yok.");output.style.display="block";dangerNote.style.display="none"}
function checkVisible(){const f=normalizePlate(searchInput.value);let changed=0;plates.forEach(i=>{if(i.plate.includes(f)&&!i.checked){i.checked=true;changed++}});saveData();render();dangerNote.textContent=changed+" görünen plaka tiklendi.";dangerNote.style.display="block"}
render();
</script>
</body>
</html>
