<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Otopark Plaka Kontrol</title>
  <style>
    :root {
      --card: #ffffff;
      --soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --green: #16a34a;
      --red: #dc2626;
      --blue: #2563eb;
      --orange: #f59e0b;
      --dark: #111827;
      --purple: #7c3aed;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
    }

    body {
      padding: 10px;
    }

    .app {
      max-width: 780px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.2);
    }

    .top {
      padding: 18px;
      background: linear-gradient(135deg, #eff6ff, #fff);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: -0.3px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .content {
      padding: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 8px;
      text-align: center;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #f8fafc;
      font-size: 16px;
      outline: none;
    }

    .search {
      padding: 13px 14px;
    }

    .search:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
      background: #fff;
    }

    .button-row,
    .bottom-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 15px;
      padding: 13px 10px;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 46px;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-blue { background: var(--blue); }
    .btn-green { background: var(--green); }
    .btn-orange { background: var(--orange); }
    .btn-red { background: var(--red); }
    .btn-dark { background: var(--dark); }
    .btn-purple { background: var(--purple); }

    .plate-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-height: 80px;
      margin: 12px 0;
    }

    .plate {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      min-height: 58px;
      user-select: none;
    }

    .plate.checked {
      background: #ecfdf5;
      border-color: #86efac;
    }

    .plate-main {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .plate input {
      width: 25px;
      height: 25px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .plate-text {
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 0.8px;
      overflow-wrap: anywhere;
    }

    .delete-one {
      width: 38px;
      height: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 12px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 20px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 22px 12px;
      line-height: 1.4;
    }

    .add-panel {
      margin-top: 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      display: none;
    }

    .add-panel.open {
      display: block;
    }

    .panel-title {
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 16px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      padding: 12px;
      font-family: inherit;
      background: #fff;
      line-height: 1.35;
    }

    .hint {
      margin: 8px 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .message,
    .danger-note {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .message {
      background: #eff6ff;
      color: #1e3a8a;
    }

    .danger-note {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .output {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: #111827;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
      user-select: text;
    }

    @media (min-width: 620px) {
      .plate-list {
        grid-template-columns: 1fr 1fr;
      }

      .controls {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .button-row {
        grid-template-columns: repeat(2, 145px);
      }

      .bottom-buttons {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 420px) {
      body { padding: 8px; }
      .content { padding: 12px; }
      h1 { font-size: 22px; }
      .plate-text { font-size: 20px; }
      .value { font-size: 22px; }
      button { font-size: 14px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="top">
      <h1>Otopark Plaka Kontrol</h1>
      <p class="sub">Plakaları ekle, doğruladıklarını tikle. Liste bu cihazdaki Safari/tarayıcı hafızasında saklanır.</p>
    </section>

    <section class="content">
      <div class="stats">
        <div class="stat">
          <div class="label">Toplam</div>
          <div class="value" id="totalCount">0</div>
        </div>
        <div class="stat">
          <div class="label">Tikli</div>
          <div class="value" id="checkedCount">0</div>
        </div>
        <div class="stat">
          <div class="label">Tiksiz</div>
          <div class="value" id="uncheckedCount">0</div>
        </div>
      </div>

      <div class="controls">
        <input class="search" id="searchInput" type="text" placeholder="Plaka ara..." autocomplete="off">
        <div class="button-row">
          <button class="btn-green" id="checkVisibleBtn">Görünenleri Tikle</button>
          <button class="btn-orange" id="clearTicksBtn">Tikleri Temizle</button>
        </div>
      </div>

      <div id="plateList" class="plate-list"></div>

      <div class="bottom-buttons">
        <button class="btn-blue" id="toggleAddBtn">Plaka Ekle</button>
        <button class="btn-purple" id="showCheckedBtn">Tiklenenleri Göster</button>
        <button class="btn-dark" id="showUncheckedBtn">Tiksizleri Göster</button>
        <button class="btn-red" id="clearPlatesBtn">Plakaları Temizle</button>
      </div>

      <div id="addPanel" class="add-panel">
        <div class="panel-title">Plaka Ekle</div>
        <textarea id="plateTextarea" placeholder="Plakaları alt alta yapıştır:
35ABC123
34XYZ45
48YY528"></textarea>
        <p class="hint">Her satıra bir plaka yaz. Boş satırlar atlanır. Aynı plaka ikinci kez eklenmez. Plakalar otomatik büyük harfe çevrilir.</p>
        <div class="button-row">
          <button class="btn-green" id="addPlatesBtn">Ekle</button>
          <button class="btn-dark" id="closeAddBtn">Kapat</button>
        </div>
        <div id="message" class="message"></div>
      </div>

      <div id="dangerNote" class="danger-note"></div>
      <div id="output" class="output"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "ios_otopark_plaka_kontrol_v3_empty_start";
    const defaultData = [];

    let plates = loadData();

    const plateList = document.getElementById("plateList");
    const totalCount = document.getElementById("totalCount");
    const checkedCount = document.getElementById("checkedCount");
    const uncheckedCount = document.getElementById("uncheckedCount");
    const searchInput = document.getElementById("searchInput");
    const addPanel = document.getElementById("addPanel");
    const plateTextarea = document.getElementById("plateTextarea");
    const message = document.getElementById("message");
    const output = document.getElementById("output");
    const dangerNote = document.getElementById("dangerNote");

    document.getElementById("toggleAddBtn").addEventListener("click", toggleAddPanel);
    document.getElementById("closeAddBtn").addEventListener("click", closeAddPanel);
    document.getElementById("addPlatesBtn").addEventListener("click", addPlates);
    document.getElementById("clearTicksBtn").addEventListener("click", clearTicks);
    document.getElementById("clearPlatesBtn").addEventListener("click", clearPlates);
    document.getElementById("showCheckedBtn").addEventListener("click", () => showList(true));
    document.getElementById("showUncheckedBtn").addEventListener("click", () => showList(false));
    document.getElementById("checkVisibleBtn").addEventListener("click", checkVisible);
    searchInput.addEventListener("input", render);

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return [...defaultData];

        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed)) return [...defaultData];

        const cleaned = [];
        const seen = new Set();

        parsed.forEach(item => {
          if (!item || typeof item.plate !== "string") return;

          const plate = normalizePlate(item.plate);
          if (!plate || seen.has(plate)) return;

          seen.add(plate);
          cleaned.push({ plate, checked: !!item.checked });
        });

        return cleaned;
      } catch (e) {
        return [...defaultData];
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(plates));
    }

    function normalizePlate(value) {
      return String(value)
        .trim()
        .replace(/\s+/g, "")
        .toLocaleUpperCase("tr-TR");
    }

    function render() {
      const filter = normalizePlate(searchInput.value);
      plateList.innerHTML = "";

      const visible = plates.filter(item => item.plate.includes(filter));

      if (visible.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = plates.length === 0
          ? "Henüz plaka yok. Alttaki Plaka Ekle butonuyla plaka ekleyebilirsin."
          : "Aramayla eşleşen plaka yok.";
        plateList.appendChild(empty);
        updateStats();
        return;
      }

      visible.forEach(item => {
        const row = document.createElement("div");
        row.className = "plate" + (item.checked ? " checked" : "");

        const label = document.createElement("label");
        label.className = "plate-main";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.checked;
        checkbox.addEventListener("change", () => {
          item.checked = checkbox.checked;
          saveData();
          render();
        });

        const span = document.createElement("span");
        span.className = "plate-text";
        span.textContent = item.plate;

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-one";
        deleteButton.type = "button";
        deleteButton.textContent = "×";
        deleteButton.title = "Bu plakayı sil";
        deleteButton.addEventListener("click", () => deletePlate(item.plate));

        label.appendChild(checkbox);
        label.appendChild(span);
        row.appendChild(label);
        row.appendChild(deleteButton);
        plateList.appendChild(row);
      });

      updateStats();
    }

    function updateStats() {
      const total = plates.length;
      const checked = plates.filter(item => item.checked).length;

      totalCount.textContent = total;
      checkedCount.textContent = checked;
      uncheckedCount.textContent = total - checked;
    }

    function toggleAddPanel() {
      addPanel.classList.toggle("open");
      message.style.display = "none";
      output.style.display = "none";
      dangerNote.style.display = "none";

      if (addPanel.classList.contains("open")) {
        setTimeout(() => plateTextarea.focus(), 80);
      }
    }

    function closeAddPanel() {
      addPanel.classList.remove("open");
    }

    function addPlates() {
      const candidates = plateTextarea.value
        .split(/\n|,|;|\t/g)
        .map(normalizePlate)
        .filter(Boolean);

      const existing = new Set(plates.map(item => item.plate));
      let added = 0;
      let duplicates = 0;

      candidates.forEach(plate => {
        if (existing.has(plate)) {
          duplicates++;
          return;
        }

        plates.push({ plate, checked: false });
        existing.add(plate);
        added++;
      });

      saveData();
      plateTextarea.value = "";
      render();

      message.textContent = added + " plaka eklendi." + (duplicates ? "\n" + duplicates + " tekrar eden plaka eklenmedi." : "");
      message.style.display = "block";
    }

    function clearTicks() {
      if (plates.length === 0) {
        showNote("Temizlenecek tik yok.");
        return;
      }

      plates.forEach(item => item.checked = false);
      saveData();
      output.style.display = "none";
      dangerNote.style.display = "none";
      render();
    }

    function clearPlates() {
      if (plates.length === 0) {
        showNote("Silinecek plaka yok.");
        return;
      }

      if (!confirm("Tüm plakalar silinsin mi? Bu işlem geri alınamaz.")) return;

      plates = [];
      saveData();
      output.style.display = "none";
      dangerNote.style.display = "none";
      render();
    }

    function deletePlate(plate) {
      if (!confirm(plate + " silinsin mi?")) return;

      plates = plates.filter(item => item.plate !== plate);
      saveData();
      output.style.display = "none";
      render();
    }

    function showList(wantedChecked) {
      const selected = plates
        .filter(item => item.checked === wantedChecked)
        .map(item => item.plate);

      output.textContent =
        (wantedChecked ? "TİKLENEN PLAKALAR" : "TİKSİZ PLAKALAR") +
        " (" + selected.length + "):\n" +
        (selected.length ? selected.join("\n") : "Yok.");

      output.style.display = "block";
      dangerNote.style.display = "none";
    }

    function checkVisible() {
      const filter = normalizePlate(searchInput.value);
      let changed = 0;

      plates.forEach(item => {
        if (item.plate.includes(filter) && !item.checked) {
          item.checked = true;
          changed++;
        }
      });

      saveData();
      render();
      showNote(changed + " görünen plaka tiklendi.");
    }

    function showNote(text) {
      dangerNote.textContent = text;
      dangerNote.style.display = "block";
    }

    render();
  </script>
</body>
</html>
